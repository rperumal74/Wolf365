# Local Postgres for integration tests (see docs/LOCAL_DEV.md).
# Start with:  docker compose up -d
# Connection:  postgresql://wolf365:wolf365@localhost:5433/wolf365_test
services:
  postgres:
    image: postgres:16-alpine
    container_name: wolf365-test-db
    environment:
      POSTGRES_USER: wolf365
      POSTGRES_PASSWORD: wolf365
      POSTGRES_DB: wolf365_test
    ports:
      - "5433:5432" # 5433 on the host to avoid clashing with a local Postgres
    volumes:
      - wolf365_test_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wolf365 -d wolf365_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wolf365_test_db:
